services:
  app:
    build: .
    ports:
      - "8000:8000"
    env_file: .env
    volumes:
      - repo_data:/data
    depends_on:
      - qdrant
    restart: unless-stopped

  qdrant:
    image: qdrant/qdrant:latest
    volumes:
      - qdrant_storage:/qdrant/storage
    restart: unless-stopped

  mcp:
    build:
      context: .
      dockerfile: mcp-server.Dockerfile
    ports:
      - "8080:8080"
    environment:
      - APP_URL=http://app:8000
      - API_KEY=${SECRET_KEY}
    depends_on:
      - app
    restart: unless-stopped

volumes:
  repo_data:
  qdrant_storage:
